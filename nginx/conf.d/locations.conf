# Shared location blocks included by both HTTP and HTTPS server blocks.

# ── API reverse proxy ────────────────────────────────────────────────
location /api/ {
    limit_req zone=api burst=20 nodelay;

    proxy_pass         http://backend/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # SSE streaming support
    proxy_buffering    off;
    proxy_cache        off;
    proxy_read_timeout 300s;
    chunked_transfer_encoding on;
}

# ── Angular SPA ──────────────────────────────────────────────────────
root /usr/share/nginx/html;
index index.html;

location / {
    try_files $uri $uri/ /index.html;
}

# Never cache the runtime config
location /config/ {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
}

# Cache static assets aggressively (Angular hashes filenames)
location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
}
